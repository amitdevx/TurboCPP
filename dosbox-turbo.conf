# DOSBox configuration for TurboCPP4Linux
# This file tunes DOSBox to use less CPU while keeping Turbo C++ responsive.
# To override a value, edit it below and restart DOSBox.

[sdl]
fullscreen=false
fulldouble=false
fullresolution=original
windowresolution=original
output=surface
autolock=true
sensitivity=100
waitonerror=true
priority=higher,normal

[dosbox]
language=
machine=svga_s3
captures=capture
memsize=16

[render]
frameskip=1
aspect=false
scaler=normal2x

[cpu]
core=auto
cputype=auto
# "auto" ramps up to max; fixed 3000 keeps Turbo C++ snappy without
# pegging a core at 100 %.  Raise to 5000-8000 if compilation feels slow.
cycles=3000
cycleup=500
cycledown=500

[mixer]
nosound=false
rate=22050
blocksize=1024
prebuffer=20

[midi]
mpu401=intelligent
mididevice=default
midiconfig=

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto
oplemu=default
oplrate=22050

[gus]
gus=false

[speaker]
pcspeaker=true
pcrate=22050
tandy=auto
tandyrate=22050
disney=true

[serial]
serial1=dummy
serial2=dummy
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[ipx]
ipx=false

[autoexec]
# Lines here run at DOSBox startup (intentionally empty —
# start.sh / start.bat pass their own -c commands).
