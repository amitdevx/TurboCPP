# DOSBox configuration for TurboCPP4Linux
# This file tunes DOSBox to use less CPU while keeping Turbo C++ responsive.
# To override a value, edit it below and restart DOSBox.

[sdl]
fullscreen=false
fulldouble=false
fullresolution=original
windowresolution=original
# Changed from 'surface' to 'overlay' to match working Turbo.C.3.2 installation
# This improves display swapping when running programs with Ctrl+F9
output=overlay
autolock=true
sensitivity=100
waitonerror=true
priority=higher,normal
# Custom key mapper: unbinds Ctrl+F9 from DOSBox's "shutdown" so the
# keystroke passes through to Turbo C++ IDE (Compile & Run).
mapperfile=mapper-turbo.map

[dosbox]
language=
machine=svga_s3
captures=capture
memsize=16

[render]
frameskip=1
aspect=false
scaler=normal2x

[cpu]
core=auto
cputype=auto
# "auto" ramps up to max; "max" uses all available CPU for best performance
# Changed from fixed 3000 to match working Turbo.C.3.2 installation
cycles=max
cycleup=10
cycledown=20

[mixer]
nosound=false
rate=22050
blocksize=1024
prebuffer=20

[midi]
mpu401=intelligent
mididevice=default
midiconfig=

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto
oplemu=default
oplrate=22050

[gus]
gus=false

[speaker]
pcspeaker=true
pcrate=22050
tandy=auto
tandyrate=22050
disney=true

[serial]
serial1=dummy
serial2=dummy
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[ipx]
ipx=false

[autoexec]
# Lines here run at DOSBox startup (intentionally empty —
# start.sh / start.bat pass their own -c commands).
